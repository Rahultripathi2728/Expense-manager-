<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro - Complete Expense Manager</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDK (Modular ESM) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, writeBatch, serverTimestamp, getDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAul_z5lHJxjhBAWVS9Hl4gQqu9eAsz_gA",
            authDomain: "expense-manager-8ab68.firebaseapp.com",
            projectId: "expense-manager-8ab68",
            storageBucket: "expense-manager-8ab68.firebasestorage.app",
            messagingSenderId: "1037902572613",
            appId: "1:1037902572613:web:da5bfe60684a17c08bc72c"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { collection, addDoc, onSnapshot, query, updateDoc, doc, writeBatch, serverTimestamp, getDoc, deleteDoc, setDoc, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, signInAnonymously };
    </script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const artifactAppId = 'expense-manager-pro-v1';

        // Icon Helper for Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block shrink-0 ${className}`}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login');
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authError, setAuthError] = useState('');

            // App States
            const [activeTab, setActiveTab] = useState('calendar');
            const [expenses, setExpenses] = useState([]);
            const [groups, setGroups] = useState([]);
            const [groceries, setGroceries] = useState([]);
            const [logs, setLogs] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            
            // UI/Form States
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [isCreateGroupModal, setIsCreateGroupModal] = useState(false);
            const [isJoinGroupModal, setIsJoinGroupModal] = useState(false);
            const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
            const [isPhotoEditMode, setIsPhotoEditMode] = useState(false);
            const [newPhotoURL, setNewPhotoURL] = useState('');
            const [historyGroupId, setHistoryGroupId] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [calcView, setCalcView] = useState('personal');
            const [expandedGroupId, setExpandedGroupId] = useState(null);

            // Filter States
            const [filterStart, setFilterStart] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
            });
            const [filterEnd, setFilterEnd] = useState(() => new Date().toISOString().split('T')[0]);

            // Form Inputs
            const [itemName, setItemName] = useState('');
            const [price, setPrice] = useState('');
            const [expenseType, setExpenseType] = useState('personal');
            const [newGroupName, setNewGroupName] = useState('');
            const [joinGroupId, setJoinGroupId] = useState('');
            const [groceryInput, setGroceryInput] = useState('');
            const [groceryType, setGroceryType] = useState('personal');

            // Today Comparison Helper
            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);

            // 1. Initial Auth Wait
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.fb && window.auth) {
                        clearInterval(timer);
                        window.fb.onAuthStateChanged(window.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // 2. Real-time Listeners
            useEffect(() => {
                if (!user || !window.db) return;

                const qGrp = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups'));
                const unsubGrp = window.fb.onSnapshot(qGrp, (snap) => {
                    const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setGroups(all.filter(g => g.members?.some(m => m.uid === user.uid)));
                });

                const qLogs = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'activity_logs'));
                const unsubLogs = window.fb.onSnapshot(qLogs, (snap) => setLogs(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const qExp = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses'));
                const unsubExp = window.fb.onSnapshot(qExp, (snap) => {
                    const publicData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const qPriv = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses'));
                    window.fb.onSnapshot(qPriv, (s) => setExpenses([...publicData, ...s.docs.map(d => ({ id: d.id, ...d.data() }))]));
                });

                const qGroc = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groceries'));
                const unsubGroc = window.fb.onSnapshot(qGroc, (snap) => {
                    const publicGroc = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const qPrivGroc = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'groceries'));
                    window.fb.onSnapshot(qPrivGroc, (s) => setGroceries([...publicGroc, ...s.docs.map(d => ({ id: d.id, ...d.data() }))]));
                });

                return () => { unsubGrp(); unsubLogs(); unsubExp(); unsubGroc(); };
            }, [user]);

            // Handlers
            const logActivity = async (groupId, action) => {
                if (!groupId || groupId === 'personal') return;
                await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'activity_logs'), {
                    groupId, action, userName: user.displayName || user.email, timestamp: new Date().toISOString()
                });
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (authMode === 'signup') {
                        const uc = await window.fb.createUserWithEmailAndPassword(window.auth, authEmail, authPassword);
                        await window.fb.updateProfile(uc.user, { displayName: authName });
                    } else {
                        await window.fb.signInWithEmailAndPassword(window.auth, authEmail, authPassword);
                    }
                } catch (err) { setAuthError(err.message); }
            };

            const handleAddExpense = async (e) => {
                e.preventDefault();
                if (!itemName || !price) return;
                const isGroup = expenseType !== 'personal';
                const payload = {
                    itemName, price: parseFloat(price), type: expenseType, userId: user.uid, 
                    userName: user.displayName || user.email, date: selectedDate.toISOString().split('T')[0],
                    settled: false, memberCount: isGroup ? (groups.find(g => g.id === expenseType)?.members?.length || 1) : 1,
                    timestamp: window.fb.serverTimestamp()
                };
                if (isGroup) {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses'), payload);
                    logActivity(expenseType, `Logged: ${itemName} (₹${price})`);
                } else {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses'), payload);
                }
                setItemName(''); setPrice(''); setIsExpenseModalOpen(false);
            };

            const handleCreateGroup = async (e) => {
                e.preventDefault();
                if (!newGroupName.trim()) return;
                const gRef = await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups'), {
                    name: newGroupName, adminId: user.uid, members: [{ uid: user.uid, name: user.displayName || 'Owner' }]
                });
                logActivity(gRef.id, "Group Created");
                setNewGroupName(''); setIsCreateGroupModal(false);
            };

            const handleJoinGroup = async (e) => {
                e.preventDefault();
                const gDoc = await window.fb.getDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', joinGroupId));
                if (gDoc.exists()) {
                    const members = gDoc.data().members || [];
                    if (!members.find(m => m.uid === user.uid)) {
                        await window.fb.updateDoc(gDoc.ref, { members: [...members, { uid: user.uid, name: user.displayName || 'Member' }] });
                        logActivity(joinGroupId, "Joined Group");
                        setJoinGroupId(''); setIsJoinGroupModal(false);
                    }
                }
            };

            const handleExitGroup = async (gid) => {
                const group = groups.find(g => g.id === gid);
                if (!group) return;
                const updatedMembers = group.members.filter(m => m.uid !== user.uid);
                await window.fb.updateDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', gid), {
                    members: updatedMembers
                });
                logActivity(gid, "Exited Group");
                setExpandedGroupId(null);
            };

            const handleDeleteGroup = async (gid) => {
                await window.fb.deleteDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', gid));
                setExpandedGroupId(null);
            };

            const markGroupSettled = async (gid) => {
                const batch = window.fb.writeBatch(window.db);
                expenses.filter(e => e.type === gid && !e.settled).forEach(ex => {
                    batch.update(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses', ex.id), { settled: true });
                });
                await batch.commit();
                logActivity(gid, "Full Settlement Done");
            };

            const deleteExpense = async (exp) => {
                const path = exp.type === 'personal' ? 
                    window.fb.doc(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses', exp.id) :
                    window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses', exp.id);
                await window.fb.deleteDoc(path);
            };

            // Calculations
            const stats = useMemo(() => {
                let p = 0, s = 0, breakdown = {};
                expenses.forEach(e => {
                    if (e.date >= filterStart && e.date <= filterEnd) {
                        if (e.type === 'personal') p += e.price;
                        else {
                            const share = e.price / (e.memberCount || 1);
                            s += share;
                            const gName = groups.find(g => g.id === e.type)?.name || "Group";
                            breakdown[gName] = (breakdown[gName] || 0) + share;
                        }
                    }
                });
                return { personal: p, shared: s, total: p + s, breakdown };
            }, [expenses, filterStart, filterEnd, groups]);

            const days = useMemo(() => {
                const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
                const list = [], start = new Date(year, month, 1).getDay();
                const total = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < start; i++) list.push(null);
                for (let i = 1; i <= total; i++) list.push(new Date(year, month, i));
                return list;
            }, [currentMonth]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-indigo-400 animate-pulse">FINTRACK PRO...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="w-full max-sm:w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 modal-animate">
                        <div className="text-center mb-8">
                            <div className="bg-indigo-600 text-white w-16 h-16 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 shadow-xl"><Icon name="indian-rupee" size={32}/></div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter">FinTrack Pro</h1>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            {authMode === 'signup' && <input required placeholder="Name" onChange={e => setAuthName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" />}
                            <input required type="email" placeholder="Email" onChange={e => setAuthEmail(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" />
                            <input required type="password" placeholder="Password" onChange={e => setAuthPassword(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" />
                            <button className="w-full bg-indigo-600 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl"> {authMode === 'login' ? 'Login' : 'Join Now'} </button>
                        </form>
                        <p onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="mt-6 text-center text-[10px] font-black uppercase text-slate-400 cursor-pointer">{authMode === 'login' ? 'Create Account' : 'Back to Login'}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white max-w-md mx-auto shadow-2xl relative flex flex-col pb-28">
                    {/* Header */}
                    <header className="p-6 pb-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-30">
                        <div>
                            <h1 className="text-xl font-black tracking-tighter flex items-center gap-2">
                                <span className="bg-indigo-600 text-white p-1.5 rounded-xl"><Icon name="indian-rupee" size={18}/></span>
                                FinTrack
                            </h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-1">Smart Tracking</p>
                        </div>
                        <button onClick={() => setIsProfileModalOpen(true)} className="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center overflow-hidden border border-white shadow-sm">
                            {user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover"/> : <span className="text-sm font-black text-indigo-600">{(user.displayName || user.email)[0]}</span>}
                        </button>
                    </header>

                    <main className="flex-1 p-5 overflow-y-auto space-y-6 custom-scrollbar">
                        {/* Tab Content: Calendar */}
                        {activeTab === 'calendar' && (
                            <div className="space-y-6 modal-animate">
                                <div className="bg-white rounded-[2.5rem] p-6 shadow-xl border border-slate-50">
                                    <div className="flex justify-between items-center mb-6">
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 bg-slate-50 rounded-xl"><Icon name="chevron-left"/></button>
                                        <h2 className="font-black text-sm uppercase tracking-tighter">{currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}</h2>
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 bg-slate-50 rounded-xl"><Icon name="chevron-right"/></button>
                                    </div>
                                    <div className="grid grid-cols-7 gap-y-2 text-center text-[10px] font-black">
                                        {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-slate-300 py-2">{d}</div>)}
                                        {days.map((d, i) => {
                                            const isToday = d && d.toDateString() === todayDate.toDateString();
                                            const isFuture = d && d > todayDate;
                                            const isSelected = d && d.toDateString() === selectedDate.toDateString();
                                            
                                            return (
                                                <button 
                                                    key={i} 
                                                    disabled={!d || isFuture} 
                                                    onClick={() => d && setSelectedDate(d)} 
                                                    className={`h-10 w-10 mx-auto rounded-xl flex items-center justify-center transition-all relative
                                                        ${!d ? 'opacity-0' : ''} 
                                                        ${isFuture ? 'opacity-20 grayscale cursor-not-allowed' : 'hover:bg-indigo-50'} 
                                                        ${isSelected && !isFuture ? 'bg-indigo-600 text-white shadow-lg' : ''} 
                                                        ${isToday && !isSelected ? 'bg-indigo-50 border-2 border-indigo-600 text-indigo-600 font-black' : ''}
                                                    `}
                                                >
                                                    {d?.getDate()}
                                                    {isToday && !isSelected && <div className="absolute -top-1 -right-1 w-2 h-2 bg-indigo-600 rounded-full border-2 border-white"></div>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button 
                                        onClick={() => setIsExpenseModalOpen(true)} 
                                        className="w-full mt-6 bg-indigo-600 text-white py-4 rounded-[1.8rem] font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl shadow-indigo-100 active:scale-95 transition-all"
                                    >
                                        <Icon name="plus" size={16}/> New Entry
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Journal: {selectedDate.toLocaleDateString()}</h3>
                                    {expenses.filter(e => e.date === selectedDate.toISOString().split('T')[0]).map(exp => (
                                        <div key={exp.id} className="p-5 bg-white rounded-[2rem] border border-slate-50 shadow-sm flex justify-between items-center group">
                                            <div className="flex gap-4 items-center">
                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${exp.type === 'personal' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}`}><Icon name={exp.type === 'personal' ? 'wallet' : 'users'}/></div>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{exp.itemName}</p>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-tighter">{exp.type === 'personal' ? 'Personal' : groups.find(g => g.id === exp.type)?.name}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <p className="font-black text-sm">₹{exp.price}</p>
                                                <button onClick={() => deleteExpense(exp)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Tab Content: Stats/Hisab */}
                        {activeTab === 'stats' && (
                            <div className="space-y-6 modal-animate">
                                <div className="flex bg-slate-100 p-1 rounded-2xl">
                                    <button onClick={() => setCalcView('personal')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${calcView === 'personal' ? 'bg-white shadow-sm' : 'text-slate-400'}`}>My Summary</button>
                                    <button onClick={() => setCalcView('group')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${calcView === 'group' ? 'bg-white shadow-sm' : 'text-slate-400'}`}>Groups Hisab</button>
                                </div>

                                {calcView === 'personal' ? (
                                    <div className="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-50 space-y-8">
                                        <div className="flex justify-between items-center">
                                            <input type="date" value={filterStart} onChange={e => setFilterStart(e.target.value)} className="bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none"/>
                                            <Icon name="arrow-right" size={14} className="text-slate-300"/>
                                            <input type="date" value={filterEnd} onChange={e => setFilterEnd(e.target.value)} className="bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none"/>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">Total Managed</p>
                                            <h2 className="text-6xl font-black tracking-tighter">₹{stats.total.toFixed(0)}</h2>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-6 border-t border-slate-50 text-center">
                                            <div><p className="text-[9px] font-bold text-slate-400 uppercase">Pure Personal</p><p className="font-black text-slate-800">₹{stats.personal.toFixed(0)}</p></div>
                                            <div className="border-l"><p className="text-[9px] font-bold text-slate-400 uppercase">My Share</p><p className="font-black text-indigo-600">₹{stats.shared.toFixed(0)}</p></div>
                                        </div>
                                        <div className="space-y-2">
                                            {Object.entries(stats.breakdown).map(([name, val]) => (
                                                <div key={name} className="flex justify-between p-3 bg-slate-50 rounded-xl text-xs font-bold uppercase"><span>{name}</span><span className="text-indigo-600 font-black">₹{val.toFixed(0)}</span></div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {groups.map(g => {
                                            const groupTotal = expenses.filter(e => e.type === g.id && !e.settled).reduce((acc, curr) => acc + curr.price, 0);
                                            return (
                                                <div key={g.id} className="bg-white p-6 rounded-[2.5rem] shadow-lg border border-slate-50 space-y-4">
                                                    <div className="flex justify-between items-center">
                                                        <h4 className="font-black text-sm uppercase">{g.name}</h4>
                                                        <span className="text-indigo-600 font-black text-sm bg-indigo-50 px-3 py-1 rounded-xl">₹{groupTotal}</span>
                                                    </div>
                                                    <button onClick={() => markGroupSettled(g.id)} disabled={groupTotal === 0} className="w-full py-4 bg-emerald-600 text-white rounded-[1.5rem] font-black text-[10px] uppercase shadow-lg disabled:opacity-30">Full Settlement</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Tab Content: Groups Management */}
                        {activeTab === 'groups' && (
                            <div className="space-y-6 modal-animate pb-10">
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setIsCreateGroupModal(true)} className="p-8 bg-white border-2 border-dashed border-indigo-100 rounded-[2.5rem] flex flex-col items-center gap-3 text-indigo-600 active:scale-95 transition-all"><Icon name="plus" size={32}/><span className="text-[10px] font-black uppercase tracking-widest">Create</span></button>
                                    <button onClick={() => setIsJoinGroupModal(true)} className="p-8 bg-slate-900 rounded-[2.5rem] flex flex-col items-center gap-3 text-white shadow-xl active:scale-95 transition-all"><Icon name="log-in" size={32}/><span className="text-[10px] font-black uppercase tracking-widest">Join</span></button>
                                </div>
                                <div className="space-y-4">
                                    {groups.map(g => (
                                        <div key={g.id} className="bg-white rounded-[2.5rem] border border-slate-50 shadow-md overflow-hidden">
                                            <div className="p-6 flex justify-between items-center hover:bg-slate-50/50 transition-colors" onClick={() => setExpandedGroupId(expandedGroupId === g.id ? null : g.id)}>
                                                <div className="flex-1">
                                                    <h4 className="font-black text-sm uppercase flex items-center gap-2">
                                                        {g.name} 
                                                        {g.adminId === user.uid && <Icon name="shield-check" size={14} className="text-emerald-500"/>}
                                                    </h4>
                                                    <div className="flex items-center gap-2 mt-1 opacity-40">
                                                        <p className="text-[9px] font-bold">ID: {g.id}</p>
                                                        <button onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText(g.id); }} className="hover:text-indigo-600"><Icon name="copy" size={10}/></button>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); setHistoryGroupId(g.id); }} className="p-2.5 bg-slate-100/80 rounded-xl text-slate-400 hover:text-indigo-600 transition-all"><Icon name="clock" size={16}/></button>
                                                    <div className={`p-2 transition-transform duration-300 ${expandedGroupId === g.id ? 'rotate-180' : ''}`}><Icon name="chevron-down" size={16} className="text-slate-300"/></div>
                                                </div>
                                            </div>

                                            {expandedGroupId === g.id && (
                                                <div className="px-6 pb-6 pt-2 animate-in slide-in-from-top-2 duration-300 border-t border-slate-50 space-y-5">
                                                    <div className="space-y-2">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Group Members</p>
                                                        <div className="grid grid-cols-1 gap-1.5">
                                                            {g.members?.map((m, idx) => (
                                                                <div key={idx} className="flex justify-between items-center bg-slate-50/80 p-3 rounded-2xl border border-white">
                                                                    <span className="text-xs font-bold text-slate-700">{m.name} {m.uid === user.uid && '(Me)'}</span>
                                                                    {g.adminId === m.uid && <span className="text-[8px] font-black uppercase text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg">Admin</span>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex gap-2 pt-2">
                                                        {g.adminId === user.uid ? (
                                                            <button 
                                                                onClick={() => { if(confirm("Are you sure you want to DELETE this group?")) handleDeleteGroup(g.id); }} 
                                                                className="flex-1 bg-red-50 text-red-600 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 border border-red-100 hover:bg-red-100 transition-all"
                                                            >
                                                                <Icon name="trash-2" size={14}/> Delete Group
                                                            </button>
                                                        ) : (
                                                            <button 
                                                                onClick={() => { if(confirm("Do you want to EXIT this group?")) handleExitGroup(g.id); }} 
                                                                className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-slate-200 transition-all"
                                                            >
                                                                <Icon name="user-minus" size={14}/> Exit Group
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Tab Content: Grocery */}
                        {activeTab === 'grocery' && (
                            <div className="space-y-6 modal-animate">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50 space-y-4">
                                    <div className="flex gap-2">
                                        <input value={groceryInput} onChange={e => setGroceryInput(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-2xl font-bold text-sm outline-none" placeholder="Add Item..."/>
                                        <button onClick={async () => {
                                            if (!groceryInput.trim()) return;
                                            const path = groceryType === 'personal' ? window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'groceries') : window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groceries');
                                            await window.fb.addDoc(path, { name: groceryInput, bought: false, type: groceryType, userName: user.displayName || user.email });
                                            setGroceryInput('');
                                        }} className="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg"><Icon name="plus"/></button>
                                    </div>
                                    <select value={groceryType} onChange={e => setGroceryType(e.target.value)} className="w-full p-3 bg-slate-100 rounded-xl text-[10px] font-black uppercase outline-none">
                                        <option value="personal">My List</option>
                                        {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                    </select>
                                </div>
                                <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-md border border-slate-50">
                                    {groceries.map(item => (
                                        <div key={item.id} className="flex items-center gap-4 p-5 border-b last:border-0 hover:bg-slate-50 transition-all">
                                            <button onClick={async () => {
                                                const path = item.type === 'personal' ? window.fb.doc(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'groceries', item.id) : window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groceries', item.id);
                                                await window.fb.updateDoc(path, { bought: !item.bought });
                                            }} className={item.bought ? 'text-emerald-500' : 'text-slate-200'}><Icon name={item.bought ? 'check-square' : 'square'} size={24}/></button>
                                            <div className="flex-1">
                                                <p className={`font-bold text-sm ${item.bought ? 'line-through opacity-30' : ''}`}>{item.name}</p>
                                                <p className="text-[8px] font-black text-slate-400 uppercase">{item.type === 'personal' ? 'Private' : groups.find(g => g.id === item.type)?.name}</p>
                                            </div>
                                            <button onClick={async () => {
                                                const path = item.type === 'personal' ? window.fb.doc(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'groceries', item.id) : window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groceries', item.id);
                                                await window.fb.deleteDoc(path);
                                            }} className="text-slate-200 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 left-6 right-6 max-w-[calc(448px-3rem)] mx-auto bg-slate-900 text-white rounded-[2.5rem] p-4 flex justify-around items-center shadow-2xl z-40">
                        <NavBtn icon="calendar" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
                        <NavBtn icon="pie-chart" active={activeTab === 'stats'} onClick={() => setActiveTab('stats')} />
                        <NavBtn icon="shopping-cart" active={activeTab === 'grocery'} onClick={() => setActiveTab('grocery')} />
                        <NavBtn icon="users" active={activeTab === 'groups'} onClick={() => setActiveTab('groups')} />
                    </nav>

                    {/* Modals */}
                    {isExpenseModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[3.5rem] p-10 space-y-8 modal-animate pb-16">
                                <div className="flex justify-between items-center"><h3 className="text-3xl font-black">New <span className="text-indigo-600">Entry</span></h3><button onClick={() => setIsExpenseModalOpen(false)}><Icon name="x" className="text-slate-300"/></button></div>
                                <form onSubmit={handleAddExpense} className="space-y-4">
                                    <input placeholder="What did you buy?" onChange={e => setItemName(e.target.value)} required className="w-full p-5 bg-slate-50 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-indigo-100"/>
                                    <input placeholder="Amount (₹)" type="number" onChange={e => setPrice(e.target.value)} required className="w-full p-5 bg-slate-50 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-indigo-100"/>
                                    <select onChange={e => setExpenseType(e.target.value)} className="w-full p-5 bg-slate-50 rounded-2xl font-black text-[10px] uppercase outline-none">
                                        <option value="personal">Only Me</option>
                                        {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                    </select>
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition-all">Submit Post</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isCreateGroupModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center p-8">
                            <div className="bg-white w-full rounded-[3.5rem] p-10 space-y-8 modal-animate text-center">
                                <h3 className="text-2xl font-black tracking-tight">New Group</h3>
                                <input placeholder="Group Name" onChange={e => setNewGroupName(e.target.value)} className="w-full p-5 bg-slate-50 rounded-2xl font-bold outline-none text-center border-none"/>
                                <button onClick={handleCreateGroup} className="w-full bg-indigo-600 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl">Create Now</button>
                                <button onClick={() => setIsCreateGroupModal(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Cancel</button>
                            </div>
                        </div>
                    )}

                    {isJoinGroupModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center p-8">
                            <div className="bg-white w-full rounded-[3.5rem] p-10 space-y-8 modal-animate text-center">
                                <h3 className="text-2xl font-black tracking-tight">Join Group</h3>
                                <input placeholder="Enter Group ID" onChange={e => setJoinGroupId(e.target.value)} className="w-full p-5 bg-slate-50 rounded-2xl font-mono outline-none text-center border-none"/>
                                <button onClick={handleJoinGroup} className="w-full bg-indigo-600 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl">Join Group</button>
                                <button onClick={() => setIsJoinGroupModal(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Cancel</button>
                            </div>
                        </div>
                    )}

                    {isProfileModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-8">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-10 text-center space-y-6 modal-animate">
                                <div className="w-24 h-24 bg-indigo-50 rounded-[2rem] mx-auto overflow-hidden flex items-center justify-center border-4 border-white shadow-xl relative">
                                    {user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover"/> : <span className="text-3xl font-black text-indigo-600">{(user.displayName || user.email)[0]}</span>}
                                    <button onClick={() => setIsPhotoEditMode(!isPhotoEditMode)} className="absolute bottom-0 right-0 bg-slate-900 text-white p-2 rounded-xl shadow-lg active:scale-90"><Icon name="camera" size={14}/></button>
                                </div>
                                <div>
                                    <h3 className="text-xl font-black tracking-tight">{user.displayName || 'No Name'}</h3>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{user.email}</p>
                                </div>
                                {isPhotoEditMode && (
                                    <div className="space-y-3">
                                        <input placeholder="Image URL..." onChange={e => setNewPhotoURL(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 shadow-inner"/>
                                        <button onClick={async () => {
                                            await window.fb.updateProfile(user, { photoURL: newPhotoURL });
                                            setIsPhotoEditMode(false);
                                            window.location.reload();
                                        }} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-[10px] uppercase">Update Profile</button>
                                    </div>
                                )}
                                <div className="pt-6 border-t border-slate-50 space-y-3">
                                    <button onClick={() => window.fb.signOut(window.auth)} className="w-full bg-red-50 text-red-600 py-4 rounded-3xl font-black text-xs uppercase flex items-center justify-center gap-2 hover:bg-red-100 transition-all"><Icon name="log-out" size={14}/> Sign Out</button>
                                    <button onClick={() => setIsProfileModalOpen(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {historyGroupId && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-h-[80vh] rounded-[3.5rem] flex flex-col overflow-hidden modal-animate shadow-2xl">
                                <div className="p-8 border-b flex justify-between items-center bg-white sticky top-0">
                                    <h3 className="text-xl font-black uppercase tracking-tighter">Activity Log</h3>
                                    <button onClick={() => setHistoryGroupId(null)} className="p-2 bg-slate-50 rounded-xl text-slate-300 hover:text-red-500 transition-all"><Icon name="x"/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar bg-slate-50/50">
                                    {logs.filter(l => l.groupId === historyGroupId).length === 0 ? (
                                        <div className="text-center py-20 opacity-20 font-black uppercase text-xs">No activity yet</div>
                                    ) : (
                                        logs.filter(l => l.groupId === historyGroupId).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map((log, i) => (
                                            <div key={i} className="bg-white p-5 rounded-3xl border border-slate-100 flex gap-4 shadow-sm animate-in fade-in duration-300">
                                                <div className="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 shrink-0"><Icon name="clock" size={16}/></div>
                                                <div>
                                                    <div className="flex justify-between items-center opacity-40"><span className="text-[9px] font-black uppercase tracking-widest">{log.userName}</span><span className="text-[8px] font-bold">{new Date(log.timestamp).toLocaleTimeString()}</span></div>
                                                    <p className="text-sm font-bold text-slate-800 leading-tight mt-1">{log.action}</p>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const NavBtn = ({ icon, active, onClick }) => (
            <button onClick={onClick} className={`p-4 rounded-[1.8rem] transition-all duration-300 ${active ? 'bg-indigo-600 scale-110 shadow-xl shadow-indigo-100/50 rotate-[360deg]' : 'opacity-40 hover:opacity-100'}`}>
                <Icon name={icon} size={24}/>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
