<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinTrack Pro - Professional Expense Manager</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --background: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--background);
            color: #1e293b;
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        button, div, span, a {
            outline: none !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-shadow {
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
        }

        .date-btn {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .date-btn-selected {
            background-color: #4f46e5 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            transform: scale(1.1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.4; }
        
        .modal-animate { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); } }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        button:focus { outline: none; }
        
        .input-focus-effect:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, writeBatch, serverTimestamp, getDoc, deleteDoc, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAul_z5lHJxjhBAWVS9Hl4gQqu9eAsz_gA",
            authDomain: "expense-manager-8ab68.firebaseapp.com",
            projectId: "expense-manager-8ab68",
            storageBucket: "expense-manager-8ab68.firebasestorage.app",
            messagingSenderId: "1037902572613",
            appId: "1:1037902572613:web:da5bfe60684a17c08bc72c"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { collection, addDoc, onSnapshot, query, updateDoc, doc, writeBatch, serverTimestamp, getDoc, deleteDoc, setDoc, getDocs, where, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, signInAnonymously };
    </script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const artifactAppId = 'expense-manager-pro-v1';

        // Global Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`shrink-0 ${className}`}></i>;
        };

        // Navigation Tab Component
        const NavTab = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick} 
                className={`flex flex-col items-center justify-center p-2.5 rounded-2xl transition-all duration-500 gap-1
                    ${active ? 'text-indigo-600 bg-indigo-50/50 shadow-inner' : 'text-slate-300 hover:text-slate-400'}
                `}
            >
                <div className="relative">
                    <Icon name={icon} size={22} className={active ? 'scale-110' : ''} />
                    {active && <div className="absolute -top-1 -right-1 w-1.5 h-1.5 bg-indigo-600 rounded-full animate-ping"></div>}
                </div>
                <span className={`text-[8px] font-black uppercase tracking-widest transition-all duration-300 ${active ? 'opacity-100 scale-100 mt-1' : 'opacity-0 scale-0 h-0 overflow-hidden'}`}>
                    {label}
                </span>
            </button>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authMode, setAuthMode] = useState('login');
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authError, setAuthError] = useState('');

            // Data States
            const [publicExpenses, setPublicExpenses] = useState([]);
            const [privateExpenses, setPrivateExpenses] = useState([]);
            const [groups, setGroups] = useState([]);
            const [groceries, setGroceries] = useState([]);
            const [logs, setLogs] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            
            // UI States
            const [activeTab, setActiveTab] = useState('calendar');
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [isCreateGroupModal, setIsCreateGroupModal] = useState(false);
            const [isJoinGroupModal, setIsJoinGroupModal] = useState(false);
            const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
            const [isPhotoEditMode, setIsPhotoEditMode] = useState(false);
            const [newPhotoURL, setNewPhotoURL] = useState('');
            const [historyGroupId, setHistoryGroupId] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [calcView, setCalcView] = useState('personal');
            const [expandedGroupId, setExpandedGroupId] = useState(null);
            const [isSharesExpanded, setIsSharesExpanded] = useState(false);

            // Form Inputs
            const [itemName, setItemName] = useState('');
            const [price, setPrice] = useState('');
            const [expenseType, setExpenseType] = useState('personal');
            const [newGroupName, setNewGroupName] = useState('');
            const [joinGroupId, setJoinGroupId] = useState('');
            const [groceryInput, setGroceryInput] = useState('');
            const [groceryType, setGroceryType] = useState('personal');

            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);

            // Filter States
            const [filterStart, setFilterStart] = useState(() => {
                const d = new Date();
                return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
            });
            const [filterEnd, setFilterEnd] = useState(() => new Date().toISOString().split('T')[0]);

            // Initialize Auth
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.fb && window.auth) {
                        clearInterval(timer);
                        window.fb.onAuthStateChanged(window.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            // Data Listeners
            useEffect(() => {
                if (!user || !window.db) return;

                const unsubGrp = window.fb.onSnapshot(
                    window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups')), 
                    (snap) => {
                        const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setGroups(all.filter(g => g.members?.some(m => m.uid === user.uid)));
                    }
                );

                const unsubPubExp = window.fb.onSnapshot(
                    window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses')), 
                    (snap) => setPublicExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                const unsubPrivExp = window.fb.onSnapshot(
                    window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses')), 
                    (snap) => setPrivateExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                const unsubLogs = window.fb.onSnapshot(
                    window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'activity_logs')), 
                    (snap) => setLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                const unsubGroc = window.fb.onSnapshot(
                    window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groceries')), 
                    (snap) => setGroceries(snap.docs.map(d => ({ id: d.id, ...d.data() })))
                );

                return () => { unsubGrp(); unsubPubExp(); unsubPrivExp(); unsubLogs(); unsubGroc(); };
            }, [user]);

            const allExpenses = useMemo(() => {
                const combined = [...publicExpenses, ...privateExpenses];
                const unique = [];
                const map = new Map();
                for (const item of combined) {
                    if (!map.has(item.id)) {
                        map.set(item.id, true);
                        unique.push(item);
                    }
                }
                return unique;
            }, [publicExpenses, privateExpenses]);

            const stats = useMemo(() => {
                let p = 0, s = 0, breakdown = {};
                allExpenses.forEach(e => {
                    if (e.date >= filterStart && e.date <= filterEnd) {
                        const amount = Number(e.price) || 0;
                        if (e.type === 'personal') {
                            p += amount;
                        } else {
                            const group = groups.find(g => g.id === e.type);
                            if (group) {
                                const mCount = Number(e.memberCount) || group.members?.length || 1;
                                const myShare = amount / mCount;
                                s += myShare;
                                breakdown[group.name] = (breakdown[group.name] || 0) + myShare;
                            }
                        }
                    }
                });
                return { personal: p, shared: s, total: p + s, breakdown };
            }, [allExpenses, filterStart, filterEnd, groups]);

            const currentMonthStats = useMemo(() => {
                const month = currentMonth.getMonth();
                const year = currentMonth.getFullYear();
                let total = 0;
                allExpenses.forEach(e => {
                    const d = new Date(e.date);
                    if (d.getMonth() === month && d.getFullYear() === year) {
                        const amount = Number(e.price) || 0;
                        if (e.type === 'personal') {
                            total += amount;
                        } else {
                            const group = groups.find(g => g.id === e.type);
                            const mCount = Number(e.memberCount) || group?.members?.length || 1;
                            total += amount / mCount;
                        }
                    }
                });
                return total;
            }, [allExpenses, currentMonth, groups]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (authMode === 'signup') {
                        const uc = await window.fb.createUserWithEmailAndPassword(window.auth, authEmail, authPassword);
                        await window.fb.updateProfile(uc.user, { displayName: authName });
                    } else {
                        await window.fb.signInWithEmailAndPassword(window.auth, authEmail, authPassword);
                    }
                } catch (err) { setAuthError(err.message.replace('Firebase:', '')); }
            };

            const handleAddExpense = async (e) => {
                if (e) e.preventDefault();
                if (!itemName || !price) return;
                const groupData = expenseType !== 'personal' ? groups.find(g => g.id === expenseType) : null;
                const currentMemberCount = groupData ? groupData.members?.length : 1;

                const payload = {
                    itemName, price: parseFloat(price), type: expenseType, userId: user.uid, 
                    userName: user.displayName || user.email, date: selectedDate.toISOString().split('T')[0],
                    settled: false, memberCount: currentMemberCount, timestamp: window.fb.serverTimestamp()
                };

                if (expenseType !== 'personal') {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses'), payload);
                    await logActivity(expenseType, `Logged: ${itemName} (₹${price})`);
                } else {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses'), payload);
                }
                setItemName(''); setPrice(''); setIsExpenseModalOpen(false);
            };

            const markGroupSettled = async (gid) => {
                try {
                    const q = window.fb.query(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses'), window.fb.where('type', '==', gid));
                    const snap = await window.fb.getDocs(q);
                    const unsettledDocs = snap.docs.filter(d => d.data().settled === false);
                    if (unsettledDocs.length === 0) return;
                    const batch = window.fb.writeBatch(window.db);
                    unsettledDocs.forEach(d => batch.update(d.ref, { settled: true }));
                    const groupRef = window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', gid);
                    batch.update(groupRef, { lastSettledAt: new Date().toISOString(), lastSettledBy: user.displayName || user.email });
                    await batch.commit();
                    await logActivity(gid, "Settled all outstanding balances.");
                } catch (err) { console.error(err); }
            };

            const deleteExpense = async (exp) => {
                // Verify ownership: only creator can delete
                if (exp.userId !== user.uid) {
                    alert("Only the person who added this record can delete it.");
                    return;
                }

                if (window.confirm("Are you sure you want to delete this record?")) {
                    const path = exp.type === 'personal' ? 
                        window.fb.doc(window.db, 'artifacts', artifactAppId, 'users', user.uid, 'expenses', exp.id) :
                        window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'expenses', exp.id);
                    await window.fb.deleteDoc(path);
                    if (exp.type !== 'personal') {
                        await logActivity(exp.type, `Deleted record: ${exp.itemName}`);
                    }
                }
            };

            const handleDeleteGroup = async (gid) => {
                if (window.confirm("Permanently delete this group?")) {
                    try {
                        await window.fb.deleteDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', gid));
                        setExpandedGroupId(null);
                    } catch (err) { console.error(err); }
                }
            };

            const handleLeaveGroup = async (gid) => {
                if (window.confirm("Leave this team?")) {
                    try {
                        const group = groups.find(g => g.id === gid);
                        const updatedMembers = group.members.filter(m => m.uid !== user.uid);
                        await window.fb.updateDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', gid), { members: updatedMembers });
                        setExpandedGroupId(null);
                    } catch (err) { console.error(err); }
                }
            };

            const logActivity = async (groupId, action) => {
                if (!groupId || groupId === 'personal') return;
                await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'activity_logs'), {
                    groupId, action, userName: user.displayName || user.email, timestamp: new Date().toISOString()
                });
            };

            const handleCreateGroup = async (e) => {
                e.preventDefault();
                if (!newGroupName.trim()) return;
                const gRef = await window.fb.addDoc(window.fb.collection(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups'), {
                    name: newGroupName, adminId: user.uid, members: [{ uid: user.uid, name: user.displayName || 'Owner' }]
                });
                await logActivity(gRef.id, "Group created.");
                setNewGroupName(''); setIsCreateGroupModal(false);
            };

            const handleJoinGroup = async (e) => {
                e.preventDefault();
                const gDoc = await window.fb.getDoc(window.fb.doc(window.db, 'artifacts', artifactAppId, 'public', 'data', 'groups', joinGroupId));
                if (gDoc.exists()) {
                    const members = gDoc.data().members || [];
                    if (!members.find(m => m.uid === user.uid)) {
                        await window.fb.updateDoc(gDoc.ref, { members: [...members, { uid: user.uid, name: user.displayName || 'Member' }] });
                        await logActivity(joinGroupId, "Joined team.");
                        setJoinGroupId(''); setIsJoinGroupModal(false);
                    }
                }
            };

            const days = useMemo(() => {
                const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
                const list = [], start = new Date(year, month, 1).getDay();
                const total = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < start; i++) list.push(null);
                for (let i = 1; i <= total; i++) list.push(new Date(year, month, i));
                return list;
            }, [currentMonth]);

            const handleQuickAmount = (val) => {
                const current = Number(price) || 0;
                setPrice((current + val).toString());
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-bold text-slate-400 tracking-widest text-[10px] uppercase">FinTrack Pro</p>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="w-full max-w-sm bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 modal-animate">
                        <div className="text-center mb-10">
                            <div className="bg-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-100">
                                <Icon name="indian-rupee" size={32}/>
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter leading-none">FinTrack Pro</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Manage your money better</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            {authMode === 'signup' && <input required placeholder="Full Name" onChange={e => setAuthName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-100 transition-all" />}
                            <input required type="email" placeholder="Email Address" onChange={e => setAuthEmail(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-100 transition-all" />
                            <input required type="password" placeholder="Password" onChange={e => setAuthPassword(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-indigo-100 transition-all" />
                            <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition-all"> 
                                {authMode === 'login' ? 'Sign In' : 'Signup'} 
                            </button>
                        </form>
                        <p onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="mt-8 text-center text-[10px] font-black uppercase text-slate-400 cursor-pointer hover:text-indigo-600">
                            {authMode === 'login' ? "New here? Create Account" : "Have an account? Login"}
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 max-w-md mx-auto relative flex flex-col pb-28 border-x border-slate-200">
                    
                    <header className="p-6 pb-4 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 text-white p-2.5 rounded-xl shadow-md">
                                <Icon name="indian-rupee" size={18}/>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter text-slate-900 leading-none">FinTrack</h1>
                                <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Professional Tracker</p>
                            </div>
                        </div>
                        <button onClick={() => setIsProfileModalOpen(true)} className="w-11 h-11 rounded-2xl bg-indigo-50 flex items-center justify-center border-2 border-white shadow-sm overflow-hidden active:scale-90 transition-all">
                            {user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover" /> : <span className="text-sm font-black text-indigo-600 uppercase">{(user.displayName || user.email)[0]}</span>}
                        </button>
                    </header>

                    <main className="flex-1 p-5 overflow-y-auto space-y-6 custom-scrollbar fade-in">
                        
                        {/* Tab: Calendar Journal */}
                        {activeTab === 'calendar' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-[2.5rem] p-6 shadow-xl border border-slate-100 card-shadow overflow-hidden">
                                    <div className="flex flex-col gap-5 mb-8">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 bg-slate-50 rounded-xl hover:bg-indigo-50 active:scale-90 shadow-sm transition-colors"><Icon name="chevron-left" size={18}/></button>
                                                <h2 className="font-black text-[13px] uppercase tracking-widest text-slate-900 whitespace-nowrap">{currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}</h2>
                                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 bg-slate-50 rounded-xl hover:bg-indigo-50 active:scale-90 shadow-sm transition-colors"><Icon name="chevron-right" size={18}/></button>
                                            </div>
                                            {(currentMonth.getMonth() !== todayDate.getMonth() || currentMonth.getFullYear() !== todayDate.getFullYear()) && (
                                                <button onClick={() => { setCurrentMonth(new Date(todayDate.getFullYear(), todayDate.getMonth(), 1)); setSelectedDate(new Date(todayDate)); }} className="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest border border-indigo-100 active:scale-90">Today</button>
                                            )}
                                        </div>

                                        <div className="flex items-center justify-between bg-slate-50/80 p-4 rounded-2xl border border-slate-100">
                                            <div>
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] mb-0.5">Month Spend</p>
                                                <p className="text-sm font-black text-slate-900">₹{currentMonthStats.toFixed(0)}</p>
                                            </div>
                                            <div className="h-8 w-px bg-slate-200"></div>
                                            <div className="text-right">
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] mb-0.5">Day Total</p>
                                                <p className="text-sm font-black text-indigo-600">₹{allExpenses.filter(e => e.date === selectedDate.toISOString().split('T')[0]).reduce((acc, curr) => {
                                                    const group = groups.find(g => g.id === curr.type);
                                                    const mCount = Number(curr.memberCount) || group?.members?.length || 1;
                                                    return acc + (Number(curr.price) / mCount);
                                                }, 0).toFixed(0)}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-7 gap-1.5 text-center text-[10px] font-black mb-4">
                                        {['S','M','T','W','T','F','S'].map(d => <div key={d} className="py-1 text-slate-300">{d}</div>)}
                                        {days.map((d, i) => {
                                            const isToday = d && d.toDateString() === todayDate.toDateString();

                    )}

                    {isProfileModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-8">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center space-y-6 modal-animate shadow-2xl border border-white">
                                <div className="relative inline-block mx-auto"><div className="w-24 h-24 bg-indigo-50 rounded-[2rem] mx-auto overflow-hidden flex items-center justify-center border-4 border-white shadow-xl">{user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover"/> : <span className="text-3xl font-black text-indigo-600 uppercase">{(user.displayName || user.email)[0]}</span>}</div><button onClick={() => setIsPhotoEditMode(!isPhotoEditMode)} className="absolute -bottom-2 -right-2 bg-slate-900 text-white p-2.5 rounded-2xl shadow-lg active:scale-90 transition-colors"><Icon name="camera" size={14}/></button></div>
                                <div><h3 className="text-xl font-black tracking-tight text-slate-900 leading-none">{user.displayName || 'Unnamed'}</h3><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">{user.email}</p></div>
                                {isPhotoEditMode && ( <div className="space-y-3 animate-in fade-in zoom-in-95"><input placeholder="Image URL..." onChange={e => setNewPhotoURL(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 shadow-inner"/><button onClick={async () => { await window.fb.updateProfile(window.auth.currentUser, { photoURL: newPhotoURL }); setIsPhotoEditMode(false); window.location.reload(); }} className="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-black text-[10px] uppercase active:scale-95 shadow-lg shadow-indigo-100">Set Photo</button></div>)}
                                <div className="pt-6 border-t border-slate-50 space-y-3"><button onClick={() => window.fb.signOut(window.auth)} className="w-full bg-rose-50 text-rose-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all border border-rose-100"><Icon name="log-out" size={14}/> Sign Out</button><button onClick={() => setIsProfileModalOpen(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest transition-colors hover:text-slate-600">Close Profile</button></div>
                            </div>
                        </div>
                    )}

                    {historyGroupId && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-h-[85vh] rounded-[3rem] flex flex-col overflow-hidden modal-animate shadow-2xl">
                                <div className="p-8 border-b flex justify-between items-center bg-white sticky top-0"><h3 className="text-xl font-black uppercase tracking-tighter text-slate-900 leading-none">Activity Feed</h3><button onClick={() => setHistoryGroupId(null)} className="p-2 bg-slate-50 rounded-xl text-slate-300 active:scale-90"><Icon name="x" size={20}/></button></div>
                                <div className="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar bg-slate-50/20">{logs.filter(l => l.groupId === historyGroupId).length === 0 ? (<div className="text-center py-20 opacity-20 font-black uppercase text-xs tracking-widest">No activity recorded</div>) : (logs.filter(l => l.groupId === historyGroupId).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map((log, i) => (<div key={i} className="bg-white p-5 rounded-3xl border border-white shadow-sm flex gap-4 text-left animate-in slide-in-from-bottom-2"><div className="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 shrink-0 shadow-sm"><Icon name="clock" size={16}/></div><div className="flex-1"><div className="flex justify-between items-center opacity-40 mb-1"><span className="text-[9px] font-black uppercase tracking-widest text-indigo-600 font-bold">{log.userName}</span><span className="text-[8px] font-bold">{new Date(log.timestamp).toLocaleTimeString()}</span></div><p className="text-sm font-bold text-slate-800 leading-tight tracking-tight">{log.action}</p></div></div>)))}</div>
                            </div>
                        </div>
                    )}
                    
                    {isCreateGroupModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center p-8">
                            <div className="bg-white w-full rounded-[3rem] p-10 space-y-8 modal-animate text-center shadow-2xl border border-white"><h3 className="text-2xl font-black tracking-tight text-slate-900 leading-none">New Team</h3><input placeholder="Enter Team Name..." onChange={e => setNewGroupName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-100 text-center shadow-inner"/><button onClick={handleCreateGroup} className="w-full bg-indigo-600 text-white py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 shadow-xl">Create Team</button><button onClick={() => setIsCreateGroupModal(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest hover:text-slate-600 transition-all">Cancel</button></div>
                        </div>
                    )}

                    {isJoinGroupModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center p-8">
                            <div className="bg-white w-full rounded-[3rem] p-10 space-y-8 modal-animate text-center shadow-2xl border border-white"><h3 className="text-2xl font-black tracking-tight text-slate-900 leading-none">Join Social Team</h3><input placeholder="Paste the Unique ID..." onChange={e => setJoinGroupId(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl font-mono text-xs outline-none border-2 border-transparent focus:border-indigo-100 text-center shadow-inner"/><button onClick={handleJoinGroup} className="w-full bg-indigo-600 text-white py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 shadow-xl">Authenticate</button><button onClick={() => setIsJoinGroupModal(false)} className="text-[10px] font-black text-slate-300 uppercase tracking-widest hover:text-slate-600">Dismiss</button></div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
